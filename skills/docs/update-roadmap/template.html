<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    .badge { transition: all 150ms ease; }
    .badge:hover { transform: translateY(-1px); }
    .card { transition: border-color 150ms ease, transform 150ms ease; }
    .card:hover { transform: translateY(-2px); }
    .card:target { animation: highlight 1.5s ease; }
    @keyframes highlight {
      0%   { box-shadow: 0 0 0 4px rgb(59 130 246 / 0.5); }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans antialiased">

  <header class="border-b border-zinc-200 dark:border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-12">
      <h1 class="text-4xl font-bold tracking-tight">{{TITLE}}</h1>
      <p class="mt-2 text-lg text-zinc-600 dark:text-zinc-400">{{SUBTITLE}}</p>
      <div class="mt-6 flex gap-6 text-sm text-zinc-500 dark:text-zinc-400">
        <span><strong class="text-zinc-900 dark:text-zinc-100">{{TOTAL_ISSUES}}</strong> issues</span>
        <span>Gerado em {{GENERATED_AT}}</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-12 space-y-16">
    {{WAVES_HTML}}
  </main>

  <footer class="border-t border-zinc-200 dark:border-zinc-800 mt-16">
    <div class="max-w-7xl mx-auto px-6 py-6 text-sm text-zinc-500 dark:text-zinc-400">
      Gerado por <code class="text-xs bg-zinc-100 dark:bg-zinc-900 px-1.5 py-0.5 rounded">/update-roadmap</code> &middot;
      <a href="https://github.com/rfl-designer/rfl-laravel-skills" class="underline hover:text-zinc-700 dark:hover:text-zinc-200">rfl-laravel-skills</a>
    </div>
  </footer>

</body>
</html>

TEMPLATES DE WAVE E CARD — usados pelo gerador para popular {{WAVES_HTML}}

WAVE TEMPLATE:

<section class="wave" id="wave-{N}">

  <header class="flex items-start gap-2 mb-3">

  <p class="flex-1 text-sm text-zinc-600 dark:text-zinc-300 leading-relaxed">

<span class="text-zinc-400 dark:text-zinc-500 italic">sem dependências</span>
